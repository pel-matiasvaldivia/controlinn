name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/pel-matiasvaldivia/controlinn

jobs:
  build-and-push:
    name: Build & Push Images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Backend ---
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Frontend ---
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Nginx ---
      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- FFmpeg ---
      - name: Build and push ffmpeg
        uses: docker/build-push-action@v5
        with:
          context: ./ffmpeg
          file: ./ffmpeg/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/ffmpeg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
