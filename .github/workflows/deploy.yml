name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Backend Image
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/pel-matiasvaldivia/controlinn/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend Image
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/pel-matiasvaldivia/controlinn/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push FFmpeg Image
      - name: Build and push FFmpeg Image
        uses: docker/build-push-action@v5
        with:
          context: ./ffmpeg
          file: ./ffmpeg/Dockerfile
          push: true
          tags: ghcr.io/pel-matiasvaldivia/controlinn/ffmpeg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Nginx Image
      - name: Build and push Nginx Image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ghcr.io/pel-matiasvaldivia/controlinn/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
